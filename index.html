<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choulhan Digital Pro</title>
    <style>
        :root { --primary: #2c3e50; --accent: #d4af37; --bg: #fdfcf9; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        
        .search-wrapper { position: relative; width: 100%; margin-bottom: 30px; }
        .search-box { 
            width: 100%; padding: 18px 50px 18px 25px; border: none; 
            border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-size: 1.1rem; outline: none; box-sizing: border-box;
        }
        .clear-btn { 
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            font-size: 1.5rem; color: #ccc; cursor: pointer; display: none;
        }
        .clear-btn:hover { color: var(--primary); }

        .card { 
            background: white; padding: 20px; margin-bottom: 12px; border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s; border-left: 4px solid transparent;
        }
        .card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-left: 4px solid var(--accent); }
        .card h3 { margin: 0; font-size: 1.1rem; color: var(--primary); }
        .card p { margin: 8px 0 0; font-size: 0.9rem; color: #666; }

        /* Modal */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; }
        .modal-content { 
            background: white; width: 90%; max-width: 900px; height: 85%; margin: 2% auto;
            padding: 40px; border-radius: 15px; position: relative; overflow-y: auto;
        }
        .close-modal { position: absolute; top: 15px; right: 25px; font-size: 2.5rem; cursor: pointer; }
        .hebrew-text { direction: rtl; font-family: 'SBL Hebrew', serif; font-size: 1.6rem; line-height: 2.2; text-align: justify; margin-bottom: 25px; color: #222; border-bottom: 1px solid #eee; padding-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align:center; margin-bottom:40px;">
        <h1 style="color:var(--primary); letter-spacing: -1px;">Choulhan Digital</h1>
        <div class="search-wrapper">
            <input type="text" id="search" class="search-box" placeholder="Ex: parler tefila, manger, hanoucca, 318...">
            <span id="clearSearch" class="clear-btn">&times;</span>
        </div>
    </header>

    <div id="results"></div>
</div>

<div id="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle" style="color:var(--accent); border-bottom: 2px solid #eee; padding-bottom: 10px;"></h2>
        <div id="modalText"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
