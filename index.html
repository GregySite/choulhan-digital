<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Choulhan Digital</title>
    <style>
        :root { --primary: #2c3e50; --accent: #d4af37; --bg: #f4f1ea; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        header { text-align: center; margin-bottom: 30px; }
        .search-box { width: 100%; max-width: 500px; padding: 15px; border: 2px solid var(--accent); border-radius: 25px; font-size: 1.1rem; outline: none; }
        
        #results { width: 100%; max-width: 700px; margin-top: 20px; }
        .card { background: white; padding: 20px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; transition: 0.2s; }
        .card:hover { border-right: 5px solid var(--accent); }
        .card h3 { margin: 0 0 10px 0; color: var(--primary); }
        
        /* Modal Style */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        .modal-content { background: white; width: 80%; max-width: 800px; height: 80%; padding: 30px; border-radius: 10px; overflow-y: auto; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 20px; font-size: 2rem; cursor: pointer; }
        .hebrew-text { direction: rtl; font-family: serif; font-size: 1.4rem; line-height: 1.8; border-bottom: 1px dashed #ccc; padding: 15px 0; }
    </style>
</head>
<body>

<header>
    <h1>Choulhan Digital</h1>
    <input type="text" id="search" class="search-box" placeholder="Un sujet, un mot-clé (ex: Chabbat, Matin)...">
</header>

<div id="results"></div>

<div id="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle"></h2>
        <div id="modalText">Chargement...</div>
    </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
